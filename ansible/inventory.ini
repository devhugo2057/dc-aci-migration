# ansible/inventory.ini
# ============================================================
# Ansible Inventory — ACI Provisioning
#
# The cisco.aci collection runs all tasks via the APIC REST API
# from localhost — it does NOT SSH into network devices.
# This inventory file is minimal: it just targets localhost.
#
# The APIC connection details (host, username, password) are
# all defined in vars/tenant_vars.yaml.
# ============================================================

[aci_controllers]
localhost ansible_connection=local

[aci_controllers:vars]
ansible_python_interpreter=/usr/bin/python3
